<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>SwipeLP</title>
  <link rel="stylesheet" href="/viewer/swipe.css">
</head>
<body>

<!-- ローディング -->
<div class="swipe-loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- スワイプコンテナ -->
<div class="swipe-container" id="swipeContainer"></div>

<!-- プログレスバー -->
<div class="swipe-progress">
  <div class="swipe-progress-bar" id="progressBar"></div>
</div>

<!-- インジケーター -->
<div class="swipe-indicators" id="indicators"></div>

<!-- ナビ矢印 -->
<button class="swipe-nav prev" id="navPrev">&#8249;</button>
<button class="swipe-nav next" id="navNext">&#8250;</button>

<!-- CTAボタン (sticky bottom 全幅 + マイクロコピー) -->
<div class="cta-wrapper" id="ctaWrapper">
  <button class="swipe-cta" id="ctaBtn">お問い合わせ</button>
  <div class="cta-microcopy" id="ctaMicrocopy" style="display:none;"></div>
</div>

<!-- 終端到達時の大型CTA (最終ステップで表示) -->
<div class="cta-final" id="ctaFinal">
  <div class="cta-final-card">
    <div class="cta-final-headline" id="ctaFinalHeadline">最後まで見ていただきありがとうございます</div>
    <button class="cta-final-btn" id="ctaFinalBtn">今すぐ応募する</button>
    <div class="cta-final-microcopy" id="ctaFinalMicrocopy" style="display:none;"></div>
  </div>
</div>

<!-- 応募フォーム モーダル (cta_action_type='modal_form' / 'embed_form'時に使用) -->
<div class="form-modal" id="formModal">
  <div class="form-modal-card">
    <button type="button" class="form-close" id="formCloseBtn" aria-label="閉じる">×</button>
    <h3 class="form-title" id="formTitle">お申し込み</h3>
    <!-- フォーム上部の安心要素 (LP毎カスタム可、空欄なら非表示) -->
    <div class="form-top-microcopy" id="formTopMicrocopy" style="display:none;"></div>
    <!-- マルチステップ進捗バー (multistep モードのみ表示) -->
    <div class="form-progress" id="formProgress" style="display:none;">
      <div class="form-progress-bar" id="formProgressBar"></div>
      <div class="form-progress-text" id="formProgressText">1 / 5</div>
    </div>
    <form id="submissionForm" novalidate>
      <div class="form-field" data-field="name">
        <label>お名前</label>
        <input type="text" name="name" autocomplete="name">
      </div>
      <div class="form-field" data-field="phone">
        <label>電話番号</label>
        <input type="tel" name="phone" inputmode="tel" autocomplete="tel" placeholder="例: 090-1234-5678" maxlength="13">
      </div>
      <div class="form-field" data-field="line_id">
        <label>LINE ID</label>
        <input type="text" name="line_id" placeholder="例: example_id">
      </div>
      <div class="form-field" data-field="email">
        <label>メールアドレス</label>
        <input type="email" name="email" inputmode="email" autocomplete="email" placeholder="例: name@example.com">
      </div>
      <div class="form-field" data-field="area">
        <label data-area-label>ご希望のエリア・最寄り駅</label>
        <input type="text" name="area" data-area-placeholder placeholder="例: 梅田、難波">
      </div>
      <div class="form-field" data-field="message">
        <label>メッセージ・ご質問</label>
        <textarea name="message" rows="3" placeholder="ご自由にどうぞ"></textarea>
      </div>
      <!-- ナビゲーション (multistep 用、通常モードでは "送信" のみ表示) -->
      <div class="form-nav">
        <button type="button" class="form-back-btn" id="formBackBtn" style="display:none;">← 戻る</button>
        <button type="button" class="form-next-btn" id="formNextBtn" style="display:none;">次へ →</button>
        <button type="submit" class="form-submit-btn" id="formSubmitBtn">
          <span class="form-submit-label">送信する</span>
          <span class="form-submit-spinner" aria-hidden="true"></span>
        </button>
      </div>
      <div class="form-error" id="formError" style="display:none;"></div>
    </form>
    <div class="form-success" id="formSuccess" style="display:none;">
      <div class="form-success-icon">✓</div>
      <div class="form-success-text">ありがとうございました。</div>
      <a class="form-success-cta" id="formSuccessCta" href="#" style="display:none;" target="_blank" rel="noopener noreferrer"></a>
    </div>
  </div>
</div>

<!-- 残りステップカウントダウン -->
<div class="step-remaining" id="stepRemaining"></div>

<script src="/viewer/swipe-engine.js"></script>
<script src="/viewer/tracker.js"></script>
<script>
// ===== ピクセル共通ヘルパー =====
function _slpGetCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}
function _slpSetCookie(name, value, maxAgeSec) {
  const secure = location.protocol === 'https:' ? '; Secure' : '';
  document.cookie = `${name}=${encodeURIComponent(value)}; Max-Age=${maxAgeSec}; Path=/; SameSite=Lax${secure}`;
}
// fbclid (Meta広告クリックID) を URL から取得し _fbc クッキーに 90日保存
function _slpEnsureFbcFromFbclid() {
  const params = new URLSearchParams(window.location.search);
  const fbclid = params.get('fbclid');
  if (!fbclid) return;
  // 既に有効な _fbc がある場合は上書きしない
  if (_slpGetCookie('_fbc')) return;
  const value = `fb.1.${Date.now()}.${fbclid}`;
  _slpSetCookie('_fbc', value, 60 * 60 * 24 * 90); // 90日
}
function _slpGetFbp() { return _slpGetCookie('_fbp'); }
function _slpGetFbc() { return _slpGetCookie('_fbc'); }
function _slpGenEventId() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}
// 即時実行: fbclid を URL から拾って _fbc クッキー保存
_slpEnsureFbcFromFbclid();

// ===== 広告ピクセル管理 =====
function initPixels(pixels) {
  // Meta (Facebook) Pixel
  if (pixels.meta) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', pixels.meta);
    fbq('track', 'PageView');
  }

  // TikTok Pixel
  if (pixels.tiktok) {
    !function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
    ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group",
    "enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
    ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
    for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
    ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};
    ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;
    ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=r;ttq._t=ttq._t||{};ttq._t[e+"-"+o]=+new Date;
    var i=d.createElement("script");i.type="text/javascript";i.async=!0;i.src=r+"?sdkid="+e+"&lib="+t;
    var a=d.getElementsByTagName("script")[0];a.parentNode.insertBefore(i,a)};
    ttq.load(pixels.tiktok);ttq.page()}(window,document,'ttq');
  }

  // Google Ads / gtag
  if (pixels.google) {
    var gs = document.createElement('script');
    gs.async = true;
    gs.src = 'https://www.googletagmanager.com/gtag/js?id=' + pixels.google;
    document.head.appendChild(gs);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', pixels.google);
  }

  // Google Tag Manager (GTM)
  if (pixels.gtm) {
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer',pixels.gtm);
  }

  // LINE Tag
  if (pixels.line) {
    (function(g,d,o){g._ltq=g._ltq||[];g._lt=g._lt||function(){g._ltq.push(arguments)};
    var h=d.getElementsByTagName(o)[0];var s=d.createElement(o);s.async=1;
    s.src='https://d.line-scdn.net/n/line_tag/public/release/v1/lt.js';
    h.parentNode.insertBefore(s,h)})(window,document,'script');
    _lt('init',{customerType:'lap',tagId:pixels.line});
    _lt('send','pv',[pixels.line]);
  }
}

function fireConversion(pixels, opts = {}) {
  // event_id を統一してブラウザ fbq とサーバー CAPI を重複排除
  const eventId = opts.eventId || _slpGenEventId();
  const externalId = opts.externalId || null;

  // Meta: Lead イベント (eventID 指定でCAPIと重複排除)
  if (pixels.meta && typeof fbq !== 'undefined') {
    fbq('track', 'Lead', {}, { eventID: eventId });
    // 並走でサーバー側 CAPI 送信 (ベストエフォート・失敗しても黙殺)
    try {
      fetch('/api/cv-capi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pixel_id: pixels.meta,
          event_id: eventId,
          event_name: 'Lead',
          event_time: Math.floor(Date.now() / 1000),
          fbp: _slpGetFbp(),
          fbc: _slpGetFbc(),
          event_source_url: window.location.href,
          external_id: externalId
        }),
        keepalive: true
      }).catch(() => {});
    } catch (e) { /* silent */ }
  }
  // TikTok: SubmitForm イベント
  if (pixels.tiktok && typeof ttq !== 'undefined') {
    ttq.track('SubmitForm');
  }
  // Google Ads: conversion イベント
  if (pixels.google && pixels.googleConversionLabel && typeof gtag !== 'undefined') {
    gtag('event', 'conversion', {
      send_to: pixels.google + '/' + pixels.googleConversionLabel
    });
  }
  // LINE: conversion
  if (pixels.line && typeof _lt !== 'undefined') {
    _lt('send','cv',[pixels.line],['Conversion']);
  }
  // GTM: dataLayer に conversion イベントを push (GTM側でトリガー設定可能)
  if (pixels.gtm && window.dataLayer) {
    window.dataLayer.push({ event: 'cta_conversion', conversion_type: 'cta_click', event_id: eventId });
  }
  return eventId;
}
</script>
<script>
(async function() {
  // URLからスラッグ取得
  const slug = window.location.pathname.split('/lp/')[1];
  if (!slug) return;

  // LP情報取得
  let lp;
  try {
    const res = await fetch(`/api/lp-by-slug/${slug}`);
    if (!res.ok) throw new Error('LP not found');
    lp = await res.json();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p style="color:#fff;font-size:16px;">LPが見つかりません</p>';
    return;
  }

  // ピクセル注入
  initPixels(lp.config.pixels || {});

  // 方向設定
  const direction = lp.config.direction || 'horizontal';
  const isVertical = direction === 'vertical';
  const isScroll = direction === 'scroll';
  document.documentElement.classList.add(`dir-${direction}`);
  document.body.classList.add(`dir-${direction}`);

  // scroll モード: 色指定があるときだけ CTA下に色付きスペース(88px)を出す
  // 未指定なら padding 0 で詰める (デフォルト = スペース無し)
  if (isScroll && lp.scroll_bg_color) {
    document.documentElement.style.backgroundColor = lp.scroll_bg_color;
    document.body.style.paddingBottom = 'calc(88px + env(safe-area-inset-bottom))';
  }

  // ===== scroll モード用の擬似エンジン (SwipeEngine と同じ on/getCurrentIndex/prev/next を提供) =====
  function createScrollEngine(containerEl, steps) {
    containerEl.classList.add('scroll-mode');
    let currentIndex = 0;
    const listeners = {};
    function emit(ev, data) { (listeners[ev] || []).forEach(fn => fn(data)); }

    steps.forEach((step, i) => {
      const section = document.createElement('section');
      section.className = 'scroll-section';
      section.dataset.index = i;

      const bg = document.createElement('div');
      bg.className = 'step-bg';
      if (step.image) {
        const img = document.createElement('img');
        img.className = 'step-image';
        img.src = step.image;
        img.alt = step.title || `Section ${i + 1}`;
        img.loading = i <= 1 ? 'eager' : 'lazy';
        img.draggable = false;
        bg.appendChild(img);
      } else if (step.bgGradient) {
        bg.style.background = step.bgGradient;
      }
      section.appendChild(bg);

      const badge = document.createElement('div');
      badge.className = 'step-badge';
      badge.style.color = step.textColor || '#fff';
      badge.textContent = `${i + 1} / ${steps.length}`;
      section.appendChild(badge);

      const content = document.createElement('div');
      content.className = 'step-content';
      content.style.color = step.textColor || '#fff';
      if (step.title) {
        const h2 = document.createElement('h2');
        h2.textContent = step.title;
        content.appendChild(h2);
      }
      if (step.description) {
        const p = document.createElement('p');
        p.textContent = step.description;
        content.appendChild(p);
      }
      section.appendChild(content);

      // 中間CTA: step.show_cta_after === true なら、このセクション末尾にCTA追加
      // ただし最終セクションは大型CTAが既に出るのでスキップ (重複防止)
      const isFinalSection = (i === steps.length - 1);
      if (step.show_cta_after && !isFinalSection) {
        const inlineCta = document.createElement('button');
        inlineCta.type = 'button';
        inlineCta.className = 'scroll-section-cta';
        inlineCta.dataset.scrollCta = '1';
        inlineCta.textContent = lp.cta_text || 'お問い合わせ';
        section.appendChild(inlineCta);
      }

      containerEl.appendChild(section);
    });

    // IntersectionObserver で「現在表示中のセクション」を判定 → stepChange 発火
    const observer = new IntersectionObserver((entries) => {
      let bestEntry = null;
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
          if (!bestEntry || entry.intersectionRatio > bestEntry.intersectionRatio) {
            bestEntry = entry;
          }
        }
      });
      if (bestEntry) {
        const idx = parseInt(bestEntry.target.dataset.index, 10);
        if (idx !== currentIndex) {
          const from = currentIndex;
          currentIndex = idx;
          emit('stepChange', { from, to: idx });
        }
      }
    }, { threshold: [0.5] });
    containerEl.querySelectorAll('.scroll-section').forEach(s => observer.observe(s));

    return {
      on(event, fn) { (listeners[event] = listeners[event] || []).push(fn); },
      getCurrentIndex() { return currentIndex; },
      prev() {
        const t = containerEl.querySelector(`.scroll-section[data-index="${Math.max(0, currentIndex - 1)}"]`);
        if (t) t.scrollIntoView({ behavior: 'smooth' });
      },
      next() {
        const t = containerEl.querySelector(`.scroll-section[data-index="${Math.min(steps.length - 1, currentIndex + 1)}"]`);
        if (t) t.scrollIntoView({ behavior: 'smooth' });
      },
    };
  }

  // ===== CTA カラープリセット =====
  const CTA_COLOR_PRESETS = {
    'line-green': { primary: '#06C755', secondary: '#00b848' },
    'pink':       { primary: '#FF6B9D', secondary: '#FF4778' },
    'coral':      { primary: '#FF8B7A', secondary: '#FF6B5C' },
    'red':        { primary: '#FF4757', secondary: '#E63946' },
    'orange':     { primary: '#FF6348', secondary: '#FF4500' },
    'blue':       { primary: '#4A90E2', secondary: '#357ABD' },
    'purple':     { primary: '#A855F7', secondary: '#9333EA' },
    'gold':       { primary: '#D4AF37', secondary: '#B8860B' },
  };
  function hexToRgba(hex, alpha) {
    const m = String(hex || '').match(/^#?([0-9a-f]{6})$/i);
    if (!m) return `rgba(6,199,85,${alpha})`;
    const num = parseInt(m[1], 16);
    return `rgba(${(num>>16)&0xff},${(num>>8)&0xff},${num&0xff},${alpha})`;
  }
  function darkenHex(hex, amount) {
    const m = String(hex || '').match(/^#?([0-9a-f]{6})$/i);
    if (!m) return hex;
    const num = parseInt(m[1], 16);
    const r = Math.max(0, Math.floor(((num>>16)&0xff) * (1 - amount)));
    const g = Math.max(0, Math.floor(((num>>8)&0xff) * (1 - amount)));
    const b = Math.max(0, Math.floor((num&0xff) * (1 - amount)));
    return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6, '0')}`;
  }
  (function applyCtaColor() {
    let primary, secondary;
    if (lp.cta_color === 'custom' && lp.cta_color_custom) {
      primary = lp.cta_color_custom;
      secondary = darkenHex(primary, 0.15);
    } else {
      const preset = CTA_COLOR_PRESETS[lp.cta_color] || CTA_COLOR_PRESETS['line-green'];
      primary = preset.primary;
      secondary = preset.secondary;
    }
    const root = document.documentElement;
    root.style.setProperty('--cta-primary', primary);
    root.style.setProperty('--cta-secondary', secondary);
    root.style.setProperty('--cta-glow', hexToRgba(primary, 0.5));
    root.style.setProperty('--cta-glow-strong', hexToRgba(primary, 0.75));
  })();

  // CTA設定
  const ctaBtn = document.getElementById('ctaBtn');
  ctaBtn.textContent = lp.cta_text || 'お問い合わせ';

  // マイクロコピー (sticky CTAの下)
  const microcopyEl = document.getElementById('ctaMicrocopy');
  if (lp.cta_microcopy && lp.cta_microcopy.trim()) {
    microcopyEl.textContent = lp.cta_microcopy;
    microcopyEl.style.display = '';
  }

  // 終端大型CTA
  const ctaFinal = document.getElementById('ctaFinal');
  const ctaFinalBtn = document.getElementById('ctaFinalBtn');
  const ctaFinalMicrocopy = document.getElementById('ctaFinalMicrocopy');
  const showFinalLarge = lp.cta_show_final_large !== 0; // デフォルト ON
  ctaFinalBtn.textContent = lp.cta_text || 'お問い合わせ';
  if (lp.cta_microcopy && lp.cta_microcopy.trim()) {
    ctaFinalMicrocopy.textContent = lp.cta_microcopy;
    ctaFinalMicrocopy.style.display = '';
  }

  // スワイプエンジン初期化 (scroll モードは独自エンジン)
  const container = document.getElementById('swipeContainer');
  const engine = isScroll
    ? createScrollEngine(container, lp.config.steps)
    : (() => { const e = new SwipeEngine(container, { direction }); e.init(lp.config.steps); return e; })();

  // インジケーター生成
  const indicators = document.getElementById('indicators');
  if (isVertical) indicators.classList.add('vertical');
  lp.config.steps.forEach((_, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    indicators.appendChild(dot);
  });

  // ナビ矢印の方向適用
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
  if (isVertical) {
    navPrev.classList.add('vertical');
    navNext.classList.add('vertical');
    navPrev.innerHTML = '&#8593;'; // ↑
    navNext.innerHTML = '&#8595;'; // ↓
  }

  // プログレスバー更新
  function updateUI(index) {
    const total = lp.config.steps.length;
    document.getElementById('progressBar').style.width = `${((index + 1) / total) * 100}%`;

    // ドット更新
    indicators.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });

    // ナビ矢印の表示/非表示
    navPrev.style.display = index === 0 ? 'none' : '';
    navNext.style.display = index === total - 1 ? 'none' : '';
  }

  updateUI(0);

  // トラッカー初期化
  const tracker = new SwipeLPTracker(lp.id);
  await tracker.startSession();

  // ===== 残りステップカウントダウン =====
  const remainEl = document.getElementById('stepRemaining');
  function updateRemaining(index) {
    const left = lp.config.steps.length - 1 - index;
    if (left > 0) {
      remainEl.textContent = `あと ${left} 枚`;
      remainEl.style.display = '';
      remainEl.classList.remove('pulse');
      void remainEl.offsetWidth; // reflow
      remainEl.classList.add('pulse');
    } else {
      remainEl.textContent = 'ラスト！';
      remainEl.style.display = '';
      remainEl.classList.remove('pulse');
      void remainEl.offsetWidth;
      remainEl.classList.add('pulse');
    }
  }
  updateRemaining(0);

  // イベント連携
  engine.on('stepChange', (data) => {
    updateUI(data.to);
    updateRemaining(data.to);
    tracker.onStepChange(data.from, data.to);

    const isFinal = data.to === lp.config.steps.length - 1;
    // embed_form モード: 最終ステップでフォーム自動表示 (sticky CTAは隠す)
    if (lp.cta_action_type === 'embed_form') {
      if (isFinal) {
        document.getElementById('ctaWrapper').style.display = 'none';
        if (!formModal.classList.contains('visible')) openFormModal();
      } else {
        document.getElementById('ctaWrapper').style.display = '';
        formModal.classList.remove('visible');
      }
      ctaFinal.classList.remove('visible'); // embed_form では大型CTAは出さない
    } else {
      // 通常: 最終ステップで大型CTAオーバーレイ
      if (showFinalLarge && isFinal) {
        ctaFinal.classList.add('visible');
      } else {
        ctaFinal.classList.remove('visible');
      }
    }
  });

  // クリックトラッキング
  container.addEventListener('click', (e) => {
    const stepEl = e.target.closest('.swipe-step');
    if (stepEl) {
      tracker.trackClick(engine.getCurrentIndex(), e, stepEl);
    }
  });

  // ===== フォーム機能 =====
  const ctaActionType = lp.cta_action_type || 'url';
  const formModal = document.getElementById('formModal');
  const formTitle = document.getElementById('formTitle');
  const submissionForm = document.getElementById('submissionForm');
  const formSubmitBtn = document.getElementById('formSubmitBtn');
  const formSubmitLabel = formSubmitBtn.querySelector('.form-submit-label');
  const formError = document.getElementById('formError');
  const formSuccess = document.getElementById('formSuccess');
  const formCloseBtn = document.getElementById('formCloseBtn');
  const formTopMicrocopy = document.getElementById('formTopMicrocopy');
  const formNextBtn = document.getElementById('formNextBtn');
  const formBackBtn = document.getElementById('formBackBtn');
  const formProgress = document.getElementById('formProgress');
  const formProgressBar = document.getElementById('formProgressBar');
  const formProgressText = document.getElementById('formProgressText');
  const formSuccessCta = document.getElementById('formSuccessCta');

  const isMultistep = lp.form_multistep === 1;
  if (isMultistep) formModal.classList.add('multistep');

  // フォーム上部の安心要素
  if (lp.form_top_microcopy && lp.form_top_microcopy.trim()) {
    formTopMicrocopy.textContent = lp.form_top_microcopy;
    formTopMicrocopy.style.display = '';
  }

  // 完了画面の追加CTA
  if (lp.form_success_cta_text && lp.form_success_cta_url) {
    formSuccessCta.textContent = lp.form_success_cta_text;
    formSuccessCta.href = lp.form_success_cta_url;
    formSuccessCta.style.display = '';
  }

  // 電話番号の自動ハイフン (日本の携帯番号 09012345678 → 090-1234-5678)
  const phoneInput = submissionForm.querySelector('input[name="phone"]');
  if (phoneInput) {
    phoneInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/[^\d]/g, '');
      // 携帯番号 090/080/070-XXXX-XXXX
      if (v.length > 11) v = v.slice(0, 11);
      if (/^0[789]0/.test(v)) {
        if (v.length > 7) v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7);
        else if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3);
      } else if (/^0(3|6)/.test(v)) {
        // 03/06-XXXX-XXXX (東京/大阪市内)
        if (v.length > 6) v = v.slice(0, 2) + '-' + v.slice(2, 6) + '-' + v.slice(6);
        else if (v.length > 2) v = v.slice(0, 2) + '-' + v.slice(2);
      } else if (v.length > 0) {
        // その他はそのまま (国際番号や固定電話)
        if (v.length > 6) v = v.slice(0, 4) + '-' + v.slice(4, 8) + '-' + v.slice(8);
        else if (v.length > 4) v = v.slice(0, 4) + '-' + v.slice(4);
      }
      e.target.value = v;
    });
  }

  // フォームフィールドの表示/非表示
  function configureFormFields() {
    const map = {
      name: lp.form_show_name !== 0,
      phone: lp.form_show_phone !== 0,
      line_id: lp.form_show_line_id === 1,
      email: lp.form_show_email === 1,
      area: lp.form_show_area === 1,
      message: lp.form_show_message !== 0,
    };
    // 必須にするフィールド (表示している場合のみ effective)
    // name / phone / email は表示中なら必須。 line_id / area / message は任意
    const requiredFields = new Set(['name', 'phone', 'email']);

    Object.entries(map).forEach(([key, show]) => {
      const f = submissionForm.querySelector(`.form-field[data-field="${key}"]`);
      if (!f) return;
      if (show) {
        f.classList.remove('hidden');
        const input = f.querySelector('input, textarea');
        if (input) input.required = requiredFields.has(key);
        // ラベルに必須マーク (*) を表示/非表示制御
        const label = f.querySelector('label');
        if (label) {
          const hasMark = label.querySelector('.req');
          if (requiredFields.has(key) && !hasMark) {
            const sp = document.createElement('span');
            sp.className = 'req';
            sp.textContent = ' *';
            label.appendChild(sp);
          } else if (!requiredFields.has(key) && hasMark) {
            hasMark.remove();
          }
        }
      } else {
        f.classList.add('hidden');
      }
    });

    // エリア欄: LP毎にラベル/プレースホルダーをカスタマイズ可能
    if (lp.form_show_area === 1) {
      const areaLabel = submissionForm.querySelector('[data-area-label]');
      const areaInput = submissionForm.querySelector('[data-area-placeholder]');
      if (areaLabel && lp.form_area_label) areaLabel.textContent = lp.form_area_label;
      if (areaInput && lp.form_area_placeholder) areaInput.placeholder = lp.form_area_placeholder;
    }

    // ラベル文言
    if (lp.form_submit_label) formSubmitLabel.textContent = lp.form_submit_label;
    else formSubmitLabel.textContent = lp.cta_text || '送信する';
    formTitle.textContent = lp.cta_text || 'お申し込み';
  }
  configureFormFields();

  // 埋め込みモード時は最終ステップ到達で常時表示
  if (ctaActionType === 'embed_form') {
    formModal.classList.add('embed-mode');
  }

  // マルチステップ管理
  let visibleFields = [];
  let currentStepIndex = 0;

  function showStep(index) {
    if (!isMultistep) return;
    visibleFields = Array.from(submissionForm.querySelectorAll('.form-field:not(.hidden)'))
      .map(f => f.dataset.field);
    currentStepIndex = Math.max(0, Math.min(index, visibleFields.length - 1));

    submissionForm.querySelectorAll('.form-field').forEach(f => {
      f.classList.remove('step-current');
      if (!f.classList.contains('hidden')) f.style.display = 'none';
    });
    const currentField = visibleFields[currentStepIndex];
    const target = submissionForm.querySelector(`.form-field[data-field="${currentField}"]`);
    if (target) {
      target.style.display = '';
      target.classList.add('step-current');
      setTimeout(() => {
        const input = target.querySelector('input, textarea');
        if (input) input.focus();
      }, 100);
    }
    const isLast = currentStepIndex === visibleFields.length - 1;
    formBackBtn.style.display = currentStepIndex === 0 ? 'none' : '';
    formNextBtn.style.display = isLast ? 'none' : '';
    formSubmitBtn.style.display = isLast ? '' : 'none';
    const pct = ((currentStepIndex + 1) / visibleFields.length) * 100;
    formProgressBar.style.setProperty('--progress', pct + '%');
    formProgressText.textContent = `${currentStepIndex + 1} / ${visibleFields.length}`;
    formProgress.style.display = '';
  }

  function nextStep() {
    const currentField = visibleFields[currentStepIndex];
    const input = submissionForm.querySelector(`.form-field[data-field="${currentField}"] input, .form-field[data-field="${currentField}"] textarea`);
    if (input && input.required && !input.value.trim()) {
      input.focus();
      input.reportValidity();
      return;
    }
    showStep(currentStepIndex + 1);
  }
  function prevStep() { showStep(currentStepIndex - 1); }
  formNextBtn.addEventListener('click', nextStep);
  formBackBtn.addEventListener('click', prevStep);

  function openFormModal() {
    formModal.classList.add('visible');
    formError.style.display = 'none';
    formSuccess.style.display = 'none';
    submissionForm.style.display = '';
    if (isMultistep) showStep(0);
    tracker.trackCtaClick(engine.getCurrentIndex());  // 内部DBに記録
    fireConversion(lp.config.pixels || {}, { externalId: tracker.sessionId }); // ピクセルCV発火+CAPI並走
  }
  function closeFormModal() {
    formModal.classList.remove('visible');
  }
  formCloseBtn.addEventListener('click', closeFormModal);
  formModal.addEventListener('click', (e) => {
    if (e.target === formModal) closeFormModal();
  });

  // フォーム送信
  submissionForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.style.display = 'none';
    formSubmitBtn.disabled = true;
    formSubmitBtn.classList.add('loading');
    const originalLabel = formSubmitLabel.textContent;
    formSubmitLabel.textContent = '送信中...';

    const fd = new FormData(submissionForm);
    const payload = {
      name: fd.get('name') || null,
      phone: fd.get('phone') || null,
      line_id: fd.get('line_id') || null,
      email: fd.get('email') || null,
      area: fd.get('area') || null,
      message: fd.get('message') || null,
      // UTM とリファラ
      utm_source: getQueryParam('utm_source'),
      utm_medium: getQueryParam('utm_medium'),
      utm_campaign: getQueryParam('utm_campaign'),
      utm_content: getQueryParam('utm_content'),
      referrer: document.referrer || '',
    };

    try {
      const res = await fetch(`/api/submit/${lp.id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        formError.textContent = data.error || '送信に失敗しました';
        formError.style.display = '';
        return;
      }
      // 成功 → 成功画面表示 (ピクセルCVはクリック時に既に発火済みなので二重発火しない)
      const successText = document.querySelector('.form-success-text');
      if (successText) successText.textContent = data.success_message || 'ありがとうございました。担当者よりご連絡いたします。';
      submissionForm.style.display = 'none';
      formSuccess.style.display = '';
    } catch (e2) {
      formError.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
      formError.style.display = '';
    } finally {
      formSubmitBtn.disabled = false;
      formSubmitBtn.classList.remove('loading');
      formSubmitLabel.textContent = originalLabel;
    }
  });

  function getQueryParam(key) {
    const p = new URLSearchParams(window.location.search);
    return p.get(key) || null;
  }

  // CTAクリック (sticky / 終端大型 共通) - cta_action_type で挙動切り替え
  function handleCtaClick() {
    if (ctaActionType === 'modal_form' || ctaActionType === 'embed_form') {
      openFormModal();
      return;
    }
    // url モード (デフォルト)
    tracker.trackCtaClick(engine.getCurrentIndex());
    fireConversion(lp.config.pixels || {}, { externalId: tracker.sessionId });
    if (lp.cta_url && lp.cta_url !== '#') {
      setTimeout(() => { window.open(lp.cta_url, '_blank'); }, 100);
    }
  }
  ctaBtn.addEventListener('click', handleCtaClick);
  ctaFinalBtn.addEventListener('click', handleCtaClick);
  // scroll モードの中間セクションCTAボタンにもバインド
  document.querySelectorAll('[data-scroll-cta="1"]').forEach(btn => {
    btn.addEventListener('click', handleCtaClick);
  });


  // ナビ矢印
  document.getElementById('navPrev').addEventListener('click', (e) => {
    e.stopPropagation();
    engine.prev();
  });
  document.getElementById('navNext').addEventListener('click', (e) => {
    e.stopPropagation();
    engine.next();
  });

  // ローディング非表示
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').remove(), 300);
})();
</script>
</body>
</html>
