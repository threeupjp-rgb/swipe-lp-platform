<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>SwipeLP</title>
  <link rel="stylesheet" href="/viewer/swipe.css">
</head>
<body>

<!-- ローディング -->
<div class="swipe-loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- スワイプコンテナ -->
<div class="swipe-container" id="swipeContainer"></div>

<!-- プログレスバー -->
<div class="swipe-progress">
  <div class="swipe-progress-bar" id="progressBar"></div>
</div>

<!-- インジケーター -->
<div class="swipe-indicators" id="indicators"></div>

<!-- ナビ矢印 -->
<button class="swipe-nav prev" id="navPrev">&#8249;</button>
<button class="swipe-nav next" id="navNext">&#8250;</button>

<!-- CTAボタン (sticky bottom 全幅 + マイクロコピー) -->
<div class="cta-wrapper" id="ctaWrapper">
  <button class="swipe-cta" id="ctaBtn">お問い合わせ</button>
  <div class="cta-microcopy" id="ctaMicrocopy" style="display:none;"></div>
</div>

<!-- 終端到達時の大型CTA (最終ステップで表示) -->
<div class="cta-final" id="ctaFinal">
  <div class="cta-final-card">
    <div class="cta-final-headline" id="ctaFinalHeadline">最後まで見ていただきありがとうございます</div>
    <button class="cta-final-btn" id="ctaFinalBtn">今すぐ応募する</button>
    <div class="cta-final-microcopy" id="ctaFinalMicrocopy" style="display:none;"></div>
  </div>
</div>

<!-- スワイプヒント（テキスト版） -->
<div class="swipe-hint" id="swipeHint">
  <span class="arrow">&#8592;</span> スワイプして続きを見る
</div>

<!-- 改善1: スワイプ誘導ジェスチャー -->
<div class="swipe-gesture-hint" id="gestureHint">
  <div class="gesture-hand">
    <div class="gesture-circle"></div>
    <div class="gesture-arrow"></div>
  </div>
  <div class="gesture-text">スワイプして次へ</div>
</div>

<!-- 改善2: 残りステップカウントダウン -->
<div class="step-remaining" id="stepRemaining"></div>

<script src="/viewer/swipe-engine.js"></script>
<script src="/viewer/tracker.js"></script>
<script>
// ===== 広告ピクセル管理 =====
function initPixels(pixels) {
  // Meta (Facebook) Pixel
  if (pixels.meta) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', pixels.meta);
    fbq('track', 'PageView');
  }

  // TikTok Pixel
  if (pixels.tiktok) {
    !function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
    ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group",
    "enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
    ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
    for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
    ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};
    ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;
    ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=r;ttq._t=ttq._t||{};ttq._t[e+"-"+o]=+new Date;
    var i=d.createElement("script");i.type="text/javascript";i.async=!0;i.src=r+"?sdkid="+e+"&lib="+t;
    var a=d.getElementsByTagName("script")[0];a.parentNode.insertBefore(i,a)};
    ttq.load(pixels.tiktok);ttq.page()}(window,document,'ttq');
  }

  // Google Ads / gtag
  if (pixels.google) {
    var gs = document.createElement('script');
    gs.async = true;
    gs.src = 'https://www.googletagmanager.com/gtag/js?id=' + pixels.google;
    document.head.appendChild(gs);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', pixels.google);
  }

  // Google Tag Manager (GTM)
  if (pixels.gtm) {
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer',pixels.gtm);
  }

  // LINE Tag
  if (pixels.line) {
    (function(g,d,o){g._ltq=g._ltq||[];g._lt=g._lt||function(){g._ltq.push(arguments)};
    var h=d.getElementsByTagName(o)[0];var s=d.createElement(o);s.async=1;
    s.src='https://d.line-scdn.net/n/line_tag/public/release/v1/lt.js';
    h.parentNode.insertBefore(s,h)})(window,document,'script');
    _lt('init',{customerType:'lap',tagId:pixels.line});
    _lt('send','pv',[pixels.line]);
  }
}

function fireConversion(pixels) {
  // Meta: Lead / Purchase イベント
  if (pixels.meta && typeof fbq !== 'undefined') {
    fbq('track', 'Lead');
  }
  // TikTok: SubmitForm イベント
  if (pixels.tiktok && typeof ttq !== 'undefined') {
    ttq.track('SubmitForm');
  }
  // Google Ads: conversion イベント
  if (pixels.google && pixels.googleConversionLabel && typeof gtag !== 'undefined') {
    gtag('event', 'conversion', {
      send_to: pixels.google + '/' + pixels.googleConversionLabel
    });
  }
  // LINE: conversion
  if (pixels.line && typeof _lt !== 'undefined') {
    _lt('send','cv',[pixels.line],['Conversion']);
  }
  // GTM: dataLayer に conversion イベントを push (GTM側でトリガー設定可能)
  if (pixels.gtm && window.dataLayer) {
    window.dataLayer.push({ event: 'cta_conversion', conversion_type: 'cta_click' });
  }
}
</script>
<script>
(async function() {
  // URLからスラッグ取得
  const slug = window.location.pathname.split('/lp/')[1];
  if (!slug) return;

  // LP情報取得
  let lp;
  try {
    const res = await fetch(`/api/lp-by-slug/${slug}`);
    if (!res.ok) throw new Error('LP not found');
    lp = await res.json();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p style="color:#fff;font-size:16px;">LPが見つかりません</p>';
    return;
  }

  // ピクセル注入
  initPixels(lp.config.pixels || {});

  // 方向設定
  const direction = lp.config.direction || 'horizontal';
  const isVertical = direction === 'vertical';
  document.body.classList.add(`dir-${direction}`);

  // ===== CTA カラープリセット =====
  const CTA_COLOR_PRESETS = {
    'line-green': { primary: '#06C755', secondary: '#00b848' },
    'pink':       { primary: '#FF6B9D', secondary: '#FF4778' },
    'coral':      { primary: '#FF8B7A', secondary: '#FF6B5C' },
    'red':        { primary: '#FF4757', secondary: '#E63946' },
    'orange':     { primary: '#FF6348', secondary: '#FF4500' },
    'blue':       { primary: '#4A90E2', secondary: '#357ABD' },
    'purple':     { primary: '#A855F7', secondary: '#9333EA' },
    'gold':       { primary: '#D4AF37', secondary: '#B8860B' },
  };
  function hexToRgba(hex, alpha) {
    const m = String(hex || '').match(/^#?([0-9a-f]{6})$/i);
    if (!m) return `rgba(6,199,85,${alpha})`;
    const num = parseInt(m[1], 16);
    return `rgba(${(num>>16)&0xff},${(num>>8)&0xff},${num&0xff},${alpha})`;
  }
  function darkenHex(hex, amount) {
    const m = String(hex || '').match(/^#?([0-9a-f]{6})$/i);
    if (!m) return hex;
    const num = parseInt(m[1], 16);
    const r = Math.max(0, Math.floor(((num>>16)&0xff) * (1 - amount)));
    const g = Math.max(0, Math.floor(((num>>8)&0xff) * (1 - amount)));
    const b = Math.max(0, Math.floor((num&0xff) * (1 - amount)));
    return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6, '0')}`;
  }
  (function applyCtaColor() {
    let primary, secondary;
    if (lp.cta_color === 'custom' && lp.cta_color_custom) {
      primary = lp.cta_color_custom;
      secondary = darkenHex(primary, 0.15);
    } else {
      const preset = CTA_COLOR_PRESETS[lp.cta_color] || CTA_COLOR_PRESETS['line-green'];
      primary = preset.primary;
      secondary = preset.secondary;
    }
    const root = document.documentElement;
    root.style.setProperty('--cta-primary', primary);
    root.style.setProperty('--cta-secondary', secondary);
    root.style.setProperty('--cta-glow', hexToRgba(primary, 0.5));
    root.style.setProperty('--cta-glow-strong', hexToRgba(primary, 0.75));
  })();

  // CTA設定
  const ctaBtn = document.getElementById('ctaBtn');
  ctaBtn.textContent = lp.cta_text || 'お問い合わせ';

  // マイクロコピー (sticky CTAの下)
  const microcopyEl = document.getElementById('ctaMicrocopy');
  if (lp.cta_microcopy && lp.cta_microcopy.trim()) {
    microcopyEl.textContent = lp.cta_microcopy;
    microcopyEl.style.display = '';
  }

  // 終端大型CTA
  const ctaFinal = document.getElementById('ctaFinal');
  const ctaFinalBtn = document.getElementById('ctaFinalBtn');
  const ctaFinalMicrocopy = document.getElementById('ctaFinalMicrocopy');
  const showFinalLarge = lp.cta_show_final_large !== 0; // デフォルト ON
  ctaFinalBtn.textContent = lp.cta_text || 'お問い合わせ';
  if (lp.cta_microcopy && lp.cta_microcopy.trim()) {
    ctaFinalMicrocopy.textContent = lp.cta_microcopy;
    ctaFinalMicrocopy.style.display = '';
  }

  // スワイプエンジン初期化
  const container = document.getElementById('swipeContainer');
  const engine = new SwipeEngine(container, { direction });
  engine.init(lp.config.steps);

  // インジケーター生成
  const indicators = document.getElementById('indicators');
  if (isVertical) indicators.classList.add('vertical');
  lp.config.steps.forEach((_, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    indicators.appendChild(dot);
  });

  // ナビ矢印の方向適用
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
  if (isVertical) {
    navPrev.classList.add('vertical');
    navNext.classList.add('vertical');
    navPrev.innerHTML = '&#8593;'; // ↑
    navNext.innerHTML = '&#8595;'; // ↓
  }

  // スワイプヒントの方向適用
  const hint = document.getElementById('swipeHint');
  if (isVertical) {
    hint.classList.add('vertical');
    hint.innerHTML = '<span class="arrow">&#8593;</span> スワイプして続きを見る';
  }

  // プログレスバー更新
  function updateUI(index) {
    const total = lp.config.steps.length;
    document.getElementById('progressBar').style.width = `${((index + 1) / total) * 100}%`;

    // ドット更新
    indicators.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });

    // ナビ矢印の表示/非表示
    navPrev.style.display = index === 0 ? 'none' : '';
    navNext.style.display = index === total - 1 ? 'none' : '';
  }

  updateUI(0);

  // トラッカー初期化
  const tracker = new SwipeLPTracker(lp.id);
  await tracker.startSession();

  // ===== 改善1: スワイプ誘導ジェスチャー =====
  const gestureHint = document.getElementById('gestureHint');
  if (isVertical) gestureHint.classList.add('vertical');
  // 2秒後に表示、スワイプしたら消える
  let gestureShown = false;
  setTimeout(() => { gestureShown = true; }, 500);
  function hideGesture() {
    if (gestureHint && !gestureHint.classList.contains('hidden')) {
      gestureHint.classList.add('hidden');
    }
  }

  // ===== 改善2: 残りステップカウントダウン =====
  const remainEl = document.getElementById('stepRemaining');
  function updateRemaining(index) {
    const left = lp.config.steps.length - 1 - index;
    if (left > 0) {
      remainEl.textContent = `あと ${left} 枚`;
      remainEl.style.display = '';
      remainEl.classList.remove('pulse');
      void remainEl.offsetWidth; // reflow
      remainEl.classList.add('pulse');
    } else {
      remainEl.textContent = 'ラスト！';
      remainEl.style.display = '';
      remainEl.classList.remove('pulse');
      void remainEl.offsetWidth;
      remainEl.classList.add('pulse');
    }
  }
  updateRemaining(0);

  // イベント連携
  engine.on('stepChange', (data) => {
    updateUI(data.to);
    updateRemaining(data.to);
    tracker.onStepChange(data.from, data.to);

    // ヒント・ジェスチャー非表示
    const hint = document.getElementById('swipeHint');
    if (hint) hint.style.display = 'none';
    hideGesture();

    // 最終ステップ到達時: 大型CTAをオーバーレイ表示
    if (showFinalLarge && data.to === lp.config.steps.length - 1) {
      ctaFinal.classList.add('visible');
    } else {
      ctaFinal.classList.remove('visible');
    }
  });

  // クリックトラッキング
  container.addEventListener('click', (e) => {
    const stepEl = e.target.closest('.swipe-step');
    if (stepEl) {
      tracker.trackClick(engine.getCurrentIndex(), e, stepEl);
    }
  });

  // CTAクリック (sticky / 終端大型 共通)
  function handleCtaClick() {
    tracker.trackCtaClick(engine.getCurrentIndex());
    fireConversion(lp.config.pixels || {});
    if (lp.cta_url && lp.cta_url !== '#') {
      setTimeout(() => { window.open(lp.cta_url, '_blank'); }, 100);
    }
  }
  ctaBtn.addEventListener('click', handleCtaClick);
  ctaFinalBtn.addEventListener('click', handleCtaClick);

  // ナビ矢印
  document.getElementById('navPrev').addEventListener('click', (e) => {
    e.stopPropagation();
    engine.prev();
  });
  document.getElementById('navNext').addEventListener('click', (e) => {
    e.stopPropagation();
    engine.next();
  });

  // ローディング非表示
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').remove(), 300);
})();
</script>
</body>
</html>
